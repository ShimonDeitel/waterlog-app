name: Waterlog
options:
  bundleIdPrefix: com.shimondeitel.gardenwater
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Waterlog:
    type: application
    platform: iOS
    sources:
      - path: Waterlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gardenwater
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Waterlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WaterlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WaterlogTests
      - path: Waterlog.storekit
    dependencies:
      - target: Waterlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gardenwater.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WaterlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WaterlogUITests
    dependencies:
      - target: Waterlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gardenwater.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Waterlog:
    build:
      targets:
        Waterlog: all
        WaterlogTests: [test]
        WaterlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Waterlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Waterlog.storekit
      targets:
        - WaterlogTests
        - WaterlogUITests
    archive:
      config: Release
