<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Waterlog</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#0E1E2B; color:#f2f2f0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .wrap { max-width:640px; margin:0 auto; padding:80px 24px; text-align:center; }
  h1 { font-size:2.4rem; margin-bottom:0.5rem; color:#3FA7D6; }
  p.tagline { font-size:1.15rem; color:#cfd3d1; margin-bottom:2.5rem; }
  .badge { display:inline-block; padding:10px 22px; border-radius:999px; background:#3FA7D6; color:#10130f; font-weight:600; margin-bottom:2rem; }
  .feature { background:rgba(255,255,255,0.05); border-radius:16px; padding:20px; margin:12px 0; text-align:left; }
  .feature h3 { margin:0 0 6px 0; color:#DDE8EC; }
  footer { margin-top:3rem; font-size:0.85rem; color:#8a8f8c; }
  a { color:#3FA7D6; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #3FA7D655 0%, #3FA7D600 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <div class="badge">Now on iOS</div>
  <h1>Waterlog</h1>
  <p class="tagline">Track irrigation runtimes and rainfall so you know exactly how much water your garden got.</p>
  <div class="feature">
    <h3>Free</h3>
    <p>Log a watering session with duration</p>
  </div>
  <div class="feature">
    <h3>Waterlog Pro</h3>
    <p>Weekly water totals and rainfall correlation charts</p>
  </div>
  <footer>
    <p><a href="privacy.html">Privacy Policy</a> · <a href="terms.html">Terms of Use</a></p>
    <p>Contact: s0533495227@gmail.com</p>
  </footer>
</div>
</body>
</html>
